<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Acadêmico — Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-bg"><div class="login-grid"></div></div>

  <main class="login-container">
    <div class="login-brand">
      <div class="brand-icon">⬛</div>
      <h1 class="brand-title">Kanban<br/><span>Acadêmico</span></h1>
    </div>

    <div class="login-card">
      <h2>Criar conta</h2>
      <p class="login-sub">Preencha os dados para se cadastrar</p>

      <div id="reg-erro"    class="alert alert-erro hidden"></div>
      <div id="reg-sucesso" class="alert alert-sucesso hidden"></div>

      <form id="form-register">
        <div class="field">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Seu nome" required />
        </div>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>
        <div class="field">
          <label for="senha">Senha <small>(mín. 6 caracteres)</small></label>
          <input type="password" id="senha" placeholder="••••••••" required minlength="6" />
        </div>
        <div class="field">
          <label for="matricula">Matrícula</label>
          <input type="text" id="matricula" placeholder="Ex: PROF-001 ou ALU-001" required />
        </div>
        <div class="field">
          <label for="papel">Tipo de conta</label>
          <select id="papel" required>
            <option value="">Selecione...</option>
            <option value="professor">Professor</option>
            <option value="aluno">Aluno</option>
          </select>
        </div>
        <button type="submit" class="btn-primary" id="btn-register">
          <span class="btn-text">Cadastrar</span>
          <span class="btn-loader hidden">Carregando...</span>
        </button>
      </form>

      <div class="login-divider"><span>já tem conta?</span></div>
      <button class="btn-secondary" onclick="window.location.href='index.html'">Fazer login</button>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
